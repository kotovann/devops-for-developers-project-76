- hosts: all

  roles:
  - role: geerlingguy.pip
    tags: prepare
  - role: geerlingguy.docker
    tags: prepare

  tasks:
    - name: Deploy Redmine
      tags: redmine-deploy
      block:
        - name: Create .env file
          ansible.builtin.template:
            src: .env.j2
            dest: /root/.env

        - name: Run Redmine
          community.docker.docker_container:
            name: redmine
            image: redmine
            state: started
            ports:
              - "{{ redmine_port }}:3000"
            env_file: /root/.env

- hosts: webservers
  vars:
    datadog_checks:
      http_check:
        instances:
          - name: Redmine
            url: "{{ my_url }}"
            timeout: 5
  tasks:
    - name: Install DataDog agent
      tags: monitoring
      ansible.builtin.import_role:
        name: datadog.dd.agent
